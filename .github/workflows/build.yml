name: Build IPA

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Theos
      run: |
        sudo mkdir -p /opt
        sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
        sudo chown -R $(whoami):staff /opt/theos
        echo "THEOS=/opt/theos" >> $GITHUB_ENV
        echo "PATH=/opt/theos/bin:$PATH" >> $GITHUB_ENV
    
    - name: Install Dependencies
      run: |
        brew install ldid make
        
    - name: Build Pwnify
      run: |
        cd Pwnify
        clang -o pwnify main.m -framework Foundation -fobjc-arc || make || true
        if [ -f pwnify ]; then
          sudo cp pwnify /usr/local/bin/
          sudo chmod +x /usr/local/bin/pwnify
        fi
        cd ..
    
    - name: Build All
      run: |
        export THEOS=/opt/theos
        export PATH=/opt/theos/bin:$PATH
        make all || echo "Build completed with warnings"
      continue-on-error: true
    
    - name: List Build Output
      run: |
        echo "=== Build directory contents ==="
        ls -la _build/ || echo "No _build directory"
        echo "=== PureStore packages ==="
        ls -la PureStore/.theos/packages/ || echo "No PureStore packages"
        echo "=== PureHelper packages ==="
        ls -la PureHelper/.theos/packages/ || echo "No PureHelper packages"
        echo "=== PureStoreLite packages ==="
        ls -la PureStoreLite/.theos/packages/ || echo "No PureStoreLite packages"
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: PureStore-Build
        path: |
          _build/
          PureHelper/.theos/packages/
          PureStore/.theos/packages/
          PureStoreLite/.theos/packages/
    
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT
    
    - name: Collect build artifacts
      run: |
        mkdir -p release_files
        find _build -type f -exec cp {} release_files/ \; 2>/dev/null || true
        find PureHelper/.theos/packages -name "*.deb" -exec cp {} release_files/ \; 2>/dev/null || true
        find PureStore/.theos/packages -name "*.deb" -exec cp {} release_files/ \; 2>/dev/null || true
        find PureStoreLite/.theos/packages -name "*.deb" -exec cp {} release_files/ \; 2>/dev/null || true
        ls -la release_files/
    
    - name: Create Release
      if: github.ref == 'refs/heads/main' && hashFiles('release_files/*') != ''
      uses: softprops/action-gh-release@v2
      with:
        tag_name: build-${{ steps.date.outputs.date }}
        name: Build ${{ steps.date.outputs.date }}
        body: |
          Automated build from commit ${{ github.sha }}
          
          ## Build Outputs
          - PureStore.tar - Main application archive
          - .deb packages - For jailbroken devices
          - .ipa files - Installer packages (if available)
        files: release_files/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create Tagged Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: release_files/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
