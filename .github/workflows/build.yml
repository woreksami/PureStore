name: Build IPA

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Setup Theos
      run: |
        sudo mkdir -p /opt
        sudo git clone --recursive https://github.com/theos/theos.git /opt/theos
        echo "THEOS=/opt/theos" >> $GITHUB_ENV
    
    - name: Install Dependencies
      run: |
        brew install ldid
        
    - name: Build Pwnify
      run: |
        cd Pwnify
        make
        sudo cp pwnify /usr/local/bin/
        cd ..
    
    - name: Build All
      run: |
        export THEOS=/opt/theos
        make all
    
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PureStore-Build
        path: |
          _build/*.tar
          _build/*.ipa
          PureHelper/.theos/packages/*.deb
          PureStore/.theos/packages/*.deb
          PureStoreLite/.theos/packages/*.deb
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          _build/*.tar
          _build/*.ipa
          PureHelper/.theos/packages/*.deb
          PureStore/.theos/packages/*.deb
          PureStoreLite/.theos/packages/*.deb
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
